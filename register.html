    <!-- Registration Section -->
   <section class="register-section">
      <div class="register-container">
        <div class="register-form">
          <h1>Join VirTech Academy</h1>
          <p class="subtitle">
            Start your journey to becoming a data analytics professional.
          </p>

          <form>
            <div class="form-grid">
              <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name" required />
              </div>

              <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email" required />
              </div>

              <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" placeholder="Enter your phone number" required />
              </div>

              <div class="form-group">
                <label for="qualification">Highest Qualification</label>
                <select id="qualification" required>
                  <option value="">Select qualification</option>
                  <option>12th</option>
                  <option>Diploma</option>
                  <option>Graduation</option>
                  <option>Post Graduation</option>
                </select>
              </div>

              <div class="form-group">
                <label for="location">Location</label>
                <input type="text" id="location" placeholder="City / Town" required />
              </div>
            </div>

            <button type="submit" class="btn-submit">Submit Registration</button>
          </form>
        </div>

        <div class="register-illustration">
          <img src="./assets/register-hero.webp" alt="Registration Illustration" />
        </div>
      </div>
    </section>
